<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Galerie | Passions</title>
    <link rel="stylesheet" href="galerie.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="passions-page">
    <header class="app-nav">
      <div class="logo">JK.</div>
      <nav class="nav-links">
        <a href="index.html">Accueil</a>
        <a href="about.html">À propos</a>
        <a href="projects.html">Projets</a>
        <a href="galerie.html" class="active">Passions</a>
        <a href="contact.html">Contact</a>
      </nav>
      <button id="theme-toggle">🌓</button>
    </header>

    <!-- GALERIE -->
    <div class="gallery" id="gallery">
      <img
        src="images/photo1.jpg"
        class="photo stacked"
        data-text="Description du projet 1"
        style="--rotation: -10deg"
      />
      <img
        src="images/photo2.jpg"
        class="photo stacked"
        data-text="Description du projet 2"
        style="--rotation: 5deg"
      />
      <img
        src="images/photo3.jpg"
        class="photo stacked"
        data-text="Description du projet 3"
        style="--rotation: 15deg"
      />
      <img
        src="https://github.com/ADoNiAiNa/portfolio2.0/blob/main/images/20230308_190155.jpg?raw=true"
        class="photo stacked"
        data-text="Description du projet 4"
        style="--rotation: -5deg"
      />
    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
      <span class="close" id="close">&times;</span>
      <div class="modal-content">
        <img id="modal-img" src="" />
        <div class="modal-text">
          <h2>Projet</h2>
          <p id="modal-text"></p>
        </div>
      </div>
    </div>

    <script src="portfolio.js"></script>
  </body>
</html>
