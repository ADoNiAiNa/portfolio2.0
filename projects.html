<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Galerie | Projets</title>
    <link rel="stylesheet" href="/projects.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    
    <div class="custom-cursor" id="cursor"></div>

    <header class="app-nav">
      <div class="logo">ANDO</div>
      
      <div class="burger-menu" id="burger-menu">
        <div class="line1"></div>
        <div class="line2"></div>
        <div class="line3"></div>
      </div>

      <nav class="nav-links" id="nav-links">
        <a href="/index.html" class="interactive">Accueil</a>
        <a href="/about.html" class="interactive">À propos</a>
        <a href="/projects.html" class="active interactive">Projets</a>
        <a href="/galerie.html" class="interactive">Galerie</a>

        <div class="controls-container">
          <!--<input
            type="text"
            id="project-search"
            placeholder="Rechercher un projet..."
          />-->
          <div class="filter-group">
            <button class="filter-btn active" data-filter="all">Tous</button>
            <button class="filter-btn" data-filter="web">sites web / applications</button>
            <button class="filter-btn" data-filter="video">Audiovisuel</button>
            <button class="filter-btn" data-filter="branding">Graphisme</button>
            <button class="filter-btn" data-filter="immersion">3D/VR</button>
          </div>
        </div>
      </section>

      <section class="projects-grid" id="projects-grid">
        <article class="project-card " data-category="web">
          <div class="project-frame">
            <div class="project-image-placeholder"><img src="/images/nextus_logo.png" alt="" srcset=""></div>
            <div class="project-overlay">
              <span ><a class="interactive" href="/nextus.html">Découvrir</a></span>
            </div>
          </div>
          <div class="project-info">
            <h3>Next.Us</h3>
            <p>Association</p>
          </div>
        </article>



        <article class="project-card " data-category="branding">
          <div class="project-frame">
            <div class="project-image-placeholder"><img src="/images/logo_relous.jpg" alt="" srcset=""></div>
            <div class="project-overlay">
              <span ><a class="interactive" href="/reloue.html">Découvrir</a></span>
            </div>
          </div>
          <div class="project-info">
            <h3>Relou.e.s</h3>
            <p>Association</p>
          </div>
        </article>

        <article class="project-card interactive" data-category="web">
          <div class="project-frame">
            <div class="project-image-placeholder"><img src="/images/logo_infinite.png" alt="" srcset=""></div>
            <div class="project-overlay">
              <span><a class="interactive" href="/infinite.html">Découvrir</a></span>
            </div>
          </div>
          <div class="project-info">
            <h3>infinite</h3>
            <p>Marque de bière</p>
          </div>

        <article class="project-card interactive" data-category="branding">

            <div class="project-overlay">

            </div>
          </div>
          <div class="project-info">
            <h3>Sapik</h3>
            <p>Marque de sauce piquante</p>
          </div>
        </article>

        <article class="project-card interactive" data-category="branding">
          <div class="project-frame">
            <div class="project-image-placeholder"><img src="/images/cordee_logo_trans.png" alt="" srcset=""></div>
            <div class="project-overlay">
              <span><a class="interactive" href="/corde.html">Découvrir</a></span>
            </div>
          </div>
          <div class="project-info">
            <h3>Cordées de la réussite</h3>

          </div>
